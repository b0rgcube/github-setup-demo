name: pr-checks

# Runs on every PR. The required-status-check guards merge.
#
# CUSTOMIZE ME:
#   - Replace the `tests` and `lint` step commands with whatever your project
#     actually uses (npm test, cargo test, make test, etc.).
#   - The `pr-template-lint` step is project-agnostic; it reads the PR body.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

# Minimum permissions. Do not broaden without a real reason.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # CUSTOMIZE ME — example for Python; replace with your stack
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest -v

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # CUSTOMIZE ME — example for Python; replace with your stack
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff

      - name: Run lint
        run: ruff check .

  pr-template-lint:
    name: pr-template-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Verify all required PR-template checkboxes are ticked
        uses: actions/github-script@v7
        with:
          script: |
            // Reads the PR body. Refuses if any required checkbox is empty.
            // "Required" is anything in a list-item starting with "- [ ]" or
            // "- [x]" or "- [X]" inside the standard PR template body.
            //
            // Hotfix PRs (title starts with [hotfix]) use a different
            // checklist; see PULL_REQUEST_TEMPLATE.md.

            const body = (context.payload.pull_request.body || '');
            const lines = body.split('\n');
            const isHotfix = (context.payload.pull_request.title || '')
              .toLowerCase().includes('[hotfix]');

            const unchecked = [];
            for (const line of lines) {
              // Match "- [ ]" — empty checkbox
              if (/^\s*-\s*\[\s\]\s/.test(line)) {
                unchecked.push(line.trim());
              }
            }

            // Allow "N/A — <reason>" form: a checked box followed by N/A
            // is fine. The CI only blocks on EMPTY boxes.

            if (unchecked.length > 0) {
              core.setFailed(
                `PR template has ${unchecked.length} unticked checkbox(es). ` +
                `Tick honestly (use "[x]" for checked or replace with "N/A — <reason>"). ` +
                `See docs/DEFINITION_OF_DONE.md.\n\n` +
                `Unticked items:\n` + unchecked.join('\n')
              );
            } else {
              core.info(`All checkboxes ticked. ${isHotfix ? '(hotfix)' : ''}`);
            }
